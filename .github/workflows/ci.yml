          }
          $section | Set-Content -Path "$releaseDir/release-notes.md" -Encoding utf8

      - name: Package
        run: |
          dist="$RUNNER_TEMP/ocb-studio-native-macos"
          mkdir -p "$dist"
          cp build-release/app/ocb_studio "$dist/"
          cp "$RUNNER_TEMP/release-info/release-info.txt" "$dist/"
          cp "$RUNNER_TEMP/release-info/release-notes.md" "$dist/"
          tar -czf "ocb-studio-native-macos-${{ steps.version.outputs.safe_tag }}.tar.gz" -C "$RUNNER_TEMP" "ocb-studio-native-macos"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload \
            "${{ steps.version.outputs.tag }}" \
            "ocb-studio-native-macos-${{ steps.version.outputs.safe_tag }}.tar.gz" \
            --clobber
