name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-core-tools:
    name: Build core/tools (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DOCB_BUILD_UI=OFF -DOCB_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --config Release --parallel
